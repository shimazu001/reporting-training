<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>119番 AI通報訓練システム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #222; color: #fff; text-align: center; padding: 20px; }
        .phone-screen { max-width: 400px; margin: auto; background: #333; border-radius: 30px; padding: 40px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid #444; }
        .status-light { width: 15px; height: 15px; border-radius: 50%; background: #444; margin: 10px auto; }
        .status-active { background: #ff3b30; box-shadow: 0 0 10px #ff3b30; }
        h1 { font-size: 1.2em; color: #aaa; margin-bottom: 5px; }
        #timer { font-size: 2.5em; margin: 10px 0; font-family: monospace; color: #fff; }
        #log { font-size: 0.9em; height: 180px; overflow-y: auto; text-align: left; background: #111; padding: 15px; margin: 20px 0; border-radius: 10px; color: #0f0; border: 1px solid #444; }
        button { width: 100px; height: 100px; border-radius: 50%; border: none; font-size: 1.2em; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .start-btn { background: #4cd964; color: white; box-shadow: 0 4px 0 #2f9a41; }
        .stop-btn { background: #ff3b30; color: white; box-shadow: 0 4px 0 #b71c1c; }
    </style>
</head>
<body>

<div class="phone-screen">
    <h1>119 EMERGENCY</h1>
    <div id="status-light" class="status-light"></div>
    <div id="timer">00:00</div>
    
    <div id="log">通報ボタンを押して開始</div>

    <div class="btn-area">
        <button id="mainBtn" class="start-btn">通報</button>
    </div>
</div>

<script>
    const mainBtn = document.getElementById('mainBtn');
    const logArea = document.getElementById('log');
    const timerDisplay = document.getElementById('timer');
    const statusLight = document.getElementById('status-light');

    let step = 1;
    let isFinished = false; 
    let recognition;
    let synth = window.speechSynthesis;
    let timerInterval;
    let startTime;
    let currentTimeout = null; // ディレイ制御用

    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;
        recognition.continuous = false; 
    }

    const scenario = {
        1: "はい、こちら通報訓練、119番消防署です。火事ですか？救急ですか？",
        2: "住所を教えてください。",
        3: "どこが燃えていますか？煙は出ていますか？",
        4: "けがをされている方はいますか？",
        5: "あなたの今いる場所の目標や目印となるものがありますか？",
        6: "あなたの名前と連絡先の電話番号をおしえてください。",
        7: "判りました。以上で通報訓練を終わります。これから採点をしますので少しお待ちください。"
    };

    mainBtn.onclick = () => {
        if (mainBtn.classList.contains('start-btn')) {
            startTraining();
        } else {
            stopEverything(); // 直ちに終了
        }
    };

    function startTraining() {
        mainBtn.classList.replace('start-btn', 'stop-btn');
        mainBtn.innerText = "切断";
        startTime = Date.now();
        startTimer();
        step = 1;
        isFinished = false;
        logArea.innerHTML = "";
        addLog("通信開始...");
        speak(scenario[1]);
    }

    // すべての動作を即座に停止する関数
    function stopEverything() {
        isFinished = true;
        // 音声を止める
        synth.cancel();
        // 認識を止める
        if (recognition) recognition.abort();
        // タイマーを止める
        clearInterval(timerInterval);
        // 予約済みの発声をキャンセル
        if (currentTimeout) clearTimeout(currentTimeout);
        
        statusLight.classList.remove('status-active');
        addLog("--- 訓練を強制終了しました ---");
        
        // 画面をリセット（数秒後に初期状態に戻すか、即座にリロード）
        setTimeout(() => {
            location.reload();
        }, 1000);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }, 1000);
    }

    function speak(text, customEndCallback = null) {
        if (isFinished) return;

        currentTimeout = setTimeout(() => {
            if (isFinished) return;
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 1.0; 
            uttr.pitch = 1.05; 
            
            const voices = synth.getVoices();
            const femaleVoice = voices.find(v => v.name.includes('Google') && v.lang === 'ja-JP') || voices.find(v => v.lang === 'ja-JP');
            if (femaleVoice) uttr.voice = femaleVoice;

            uttr.onend = () => {
                if (isFinished) return;
                if (customEndCallback) {
                    customEndCallback();
                } else if (step <= 6) {
                    listen();
                } else if (step === 7) {
                    setTimeout(() => { if(!isFinished) showScore(); }, 2000);
                }
            };
            addLog("AI: " + text);
            synth.speak(uttr);
        }, 500); // 反応ディレイ 0.5秒
    }

    function listen() {
        if (isFinished) return;
        statusLight.classList.add('status-active');
        try {
            recognition.start();
        } catch(e) {}

        recognition.onresult = (event) => {
            if (isFinished) return;
            statusLight.classList.remove('status-active');
            const result = event.results[0][0].transcript;
            addLog("あなた: " + result);

            if (step === 1) {
                if (result.includes("火事")) {
                    step = 2;
                    speak(scenario[2]);
                } else {
                    speak(scenario[1]); 
                }
            } else if (step === 2) {
                if (result.length > 4) {
                    speak(result + "、ですね。確認できました。 次に、" + scenario[3]);
                    step = 4;
                } else {
                    speak("もう一度、正確に住所を教えてください。");
                }
            } else if (step === 4) {
                step = 5;
                speak(scenario[4]);
            } else if (step === 5) {
                step = 6;
                speak(scenario[5]);
            } else if (step === 6) {
                step = 7;
                speak(scenario[6]);
            } else if (step === 7) {
                step = 8;
                speak(scenario[7]);
            }
        };

        recognition.onerror = (event) => {
            statusLight.classList.remove('status-active');
            if (!isFinished && event.error !== 'aborted') {
                setTimeout(() => { if(!isFinished) listen(); }, 500);
            }
        };
    }

    function showScore() {
        if (isFinished) return;
        const score = Math.floor(Math.random() * 6) + 5; 
        const scoreText = `あなたの訓練を採点した結果、10点満点中${score}点でした。この結果を上長に伝えてください。お疲れ様でした。`;
        
        speak(scoreText, () => {
            if (!isFinished) {
                playDisconnectSound();
            }
        });
    }

    function playDisconnectSound() {
        if (isFinished) return;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 400;
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.4, time + 0.01);
            gain.gain.linearRampToValueAtTime(0, time + 0.5);
            osc.start(time);
            osc.stop(time + 0.5);
        }
        
        const now = audioCtx.currentTime;
        const startOffset = 2.0; 
        for(let i=0; i<3; i++) beep(now + startOffset + (i * 1.0));

        setTimeout(() => {
            if (!isFinished) {
                clearInterval(timerInterval);
                isFinished = true;
                addLog("--- 訓練終了 ---");
                mainBtn.style.display = "none";
            }
        }, (startOffset + 3) * 1000);
    }

    function addLog(msg) {
        const p = document.createElement('p');
        p.textContent = msg;
        logArea.appendChild(p);
        logArea.scrollTop = logArea.scrollHeight;
    }
    
    window.speechSynthesis.getVoices();
</script>

</body>
</html>
