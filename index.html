<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>119番 通報訓練システム</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #222; color: #fff; text-align: center; padding: 20px; touch-action: manipulation; margin: 0; }
        .phone-screen { max-width: 400px; margin: 20px auto; background: #333; border-radius: 30px; padding: 40px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid #444; position: relative; }
        .status-light { width: 15px; height: 15px; border-radius: 50%; background: #444; margin: 10px auto; transition: 0.3s; }
        .status-active { background: #ff3b30; box-shadow: 0 0 10px #ff3b30; }
        h1 { font-size: 1.4em; color: #fff; margin-bottom: 5px; letter-spacing: 1px; }
        #timer { font-size: 2.5em; margin: 10px 0; font-family: monospace; color: #fff; }
        #log { font-size: 0.9em; height: 180px; overflow-y: auto; text-align: left; background: #111; padding: 15px; margin: 20px 0; border-radius: 10px; color: #0f0; border: 1px solid #444; line-height: 1.4; }
        button { width: 100px; height: 100px; border-radius: 50%; border: none; font-size: 1.2em; cursor: pointer; transition: 0.3s; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        .start-btn { background: #4cd964; color: white; box-shadow: 0 4px 0 #2f9a41; }
        .stop-btn { background: #ff3b30; color: white; box-shadow: 0 4px 0 #b71c1c; }
        footer { margin-top: 30px; font-size: 0.8em; color: #777; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="phone-screen">
    <h1>119 AI通報訓練</h1>
    <div id="status-light" class="status-light"></div>
    <div id="timer">00:00</div>
    <div id="log">通報ボタンを押して開始</div>
    <div class="btn-area">
        <button id="mainBtn" class="start-btn">通報</button>
    </div>
</div>

<footer>
    &copy;2026 NAKADA INDUSTRIAL CO.,LTD
</footer>

<script>
    const mainBtn = document.getElementById('mainBtn');
    const logArea = document.getElementById('log');
    const timerDisplay = document.getElementById('timer');
    const statusLight = document.getElementById('status-light');

    let step = 1;
    let isFinished = false; 
    let isSpeaking = false;
    let recognition;
    let synth = window.speechSynthesis;
    let timerInterval;
    let startTime;
    let currentTimeout = null;

    let totalConfidence = 0;
    let recognitionCount = 0;
    let infoScore = 0;

    const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;
        recognition.continuous = false;
    }

    const scenario = {
        1: "はい、こちら通報訓練、119番消防署です。火事ですか？救急ですか？",
        2: "住所を教えてください。",
        3: "どこが燃えていますか？煙は出ていますか？",
        4: "けがをされている方はいますか？",
        5: "あなたの今いる場所の目標や目印となるものがありますか？",
        6: "あなたの名前と電話番号をおしえてください。",
        7: "判りました。以上で通報訓練を終わります。これから採点をしますので少しお待ちください。"
    };

    mainBtn.onclick = () => {
        if (mainBtn.classList.contains('start-btn')) {
            startTraining();
        } else {
            stopEverything();
        }
    };

    function startTraining() {
        mainBtn.classList.replace('start-btn', 'stop-btn');
        mainBtn.innerText = "切断";
        startTime = Date.now();
        startTimer();
        step = 1; isFinished = false; totalConfidence = 0; recognitionCount = 0; infoScore = 0;
        logArea.innerHTML = "";
        addLog("通信開始...");
        speak(scenario[1]);
    }

    function stopEverything() {
        isFinished = true;
        synth.cancel();
        if (recognition) try { recognition.abort(); } catch(e) {}
        clearInterval(timerInterval);
        if (currentTimeout) clearTimeout(currentTimeout);
        statusLight.classList.remove('status-active');
        addLog("--- 訓練を終了しました ---");
        setTimeout(() => { location.reload(); }, 1200);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }, 1000);
    }

    function speak(text, callback = null) {
        isSpeaking = true;
        currentTimeout = setTimeout(() => {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.onend = () => {
                isSpeaking = false;
                if (callback) callback();
                if (!isFinished) listen();
            };
            addLog("AI: " + text);
            synth.speak(uttr);
        }, 300); 
    }

    function listen() {
        if (isFinished || isSpeaking) return;
        statusLight.classList.add('status-active');
        try { recognition.start(); } catch(e) {}

        recognition.onresult = (event) => {
            const result = event.results[0][0].transcript;
            const confidence = event.results[0][0].confidence;
            addLog("あなた: " + result);
            totalConfidence += confidence;
            recognitionCount++;
            recognition.userData = result;
        };

        recognition.onend = () => {
            statusLight.classList.remove('status-active');
            if (isFinished || isSpeaking) return;
            const transcript = recognition.userData || "";
            recognition.userData = ""; 

            if (transcript.trim() !== "") {
                processFlow(transcript);
            } else {
                addLog("（聞き取り不能）");
                speak("恐れ入ります、もう一度教えていただけますか？");
            }
        };
    }

    function processFlow(result) {
        if (step === 1) {
            if (result.includes("火事") || result.includes("救急")) {
                step = 2; speak(scenario[2]);
            } else {
                speak("火事ですか？救急ですか？どちらか教えてください。");
            }
            return;
        } 
        
        if (step === 2) {
            if (result.length > 4) {
                infoScore += 2;
                step = 3; 
                speak(result + "、ですね。承知しました。次に、" + scenario[3]);
            } else {
                speak("住所を正確に教えてください。");
            }
            return;
        } 

        if (step === 3) {
            infoScore += 1;
            step = 4;
            speak(scenario[4]);
            return;
        }

        if (step === 4) {
            infoScore += 1;
            step = 5;
            speak(scenario[5]);
            return;
        }

        if (step === 5) {
            infoScore += 1;
            step = 6;
            speak(scenario[6]);
            return;
        }

        if (step === 6) {
            const hasNumber = /\d/.test(result);
            if (result.length >= 5 && hasNumber) {
                infoScore += 3;
                step = 7;
                isFinished = true;
                speak(scenario[7], () => {
                    setTimeout(() => { showScore(); }, 2000);
                });
            } else {
                speak("電話番号が聞き取れません。番号も含めてもう一度教えてください。");
            }
            return;
        }
    }

    function showScore() {
        const avgConfidence = recognitionCount > 0 ? (totalConfidence / recognitionCount) : 0;
        let finalScore = (avgConfidence * 4) + (infoScore * 1.0) + 1;
        finalScore = Math.min(Math.max(Math.round(finalScore), 1), 10);

        const scoreText = `訓練お疲れ様でした。採点の結果、10点満点中、${finalScore}点です。滑舌や情報の正確さを意識して、引き続き訓練に励んでください。`;
        speak(scoreText, () => {
            playDisconnectSound();
        });
    }

    function playDisconnectSound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(time) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 400;
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(0.4, time + 0.01);
            gain.gain.linearRampToValueAtTime(0, time + 0.5);
            osc.start(time); osc.stop(time + 0.5);
        }
        const now = audioCtx.currentTime;
        for(let i=0; i<3; i++) beep(now + 1.0 + (i * 1.0));
        setTimeout(() => {
            clearInterval(timerInterval);
            addLog("--- 訓練終了 ---");
            mainBtn.style.display = "none";
        }, 4500);
    }

    function addLog(msg) {
        const p = document.createElement('p');
        p.textContent = msg;
        logArea.appendChild(p);
        logArea.scrollTop = logArea.scrollHeight;
    }
    window.speechSynthesis.getVoices();
</script>
</body>
</html>
